name: Update Profile Cards

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */6 * * *"
  push:
    branches:
      - main
    paths:
      - "scripts/generate-profile-card.mjs"
      - "config/agentic-cards.json"
      - ".github/workflows/update-profile-card.yml"

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      PROFILE_STATS_TOKEN: ${{ secrets.PROFILE_STATS_TOKEN }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Generate cards
        run: |
          if [ -z "${PROFILE_STATS_TOKEN}" ]; then
            echo "PROFILE_STATS_TOKEN is not configured; skipping card generation."
            exit 0
          fi
          node scripts/generate-profile-card.mjs

      - name: Commit generated cards
        run: |
          if [ -z "${PROFILE_STATS_TOKEN}" ]; then
            echo "PROFILE_STATS_TOKEN is not configured; skipping commit."
            exit 0
          fi
          if git diff --quiet -- assets/agentic-strategy-card.svg assets/agentic-execution-card.svg assets/agentic-validation-card.svg assets/github-work-card.svg assets/github-activity-overview.svg; then
            echo "No card changes to commit."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main
          git add assets
          git commit -m "Update profile cards"
          git push
