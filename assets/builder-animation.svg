<svg xmlns="http://www.w3.org/2000/svg" width="900" height="120" viewBox="0 0 900 120" role="img" aria-label="Animated builder moving left and right">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#1f2937"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="900" height="120" fill="url(#sky)" rx="14"/>
  <rect x="0" y="86" width="900" height="34" fill="url(#ground)"/>

  <g fill="#64748b">
    <rect x="690" y="70" width="30" height="16" rx="2"/>
    <rect x="724" y="66" width="30" height="20" rx="2"/>
    <rect x="758" y="72" width="30" height="14" rx="2"/>
  </g>

  <g transform="translate(70 0)">
    <animateTransform attributeName="transform" type="translate" values="70 0;700 0;70 0" dur="9s" repeatCount="indefinite"/>

    <g>
      <animateTransform attributeName="transform" type="translate" values="0 0;0 -2;0 0" dur="0.45s" repeatCount="indefinite"/>

      <circle cx="40" cy="48" r="10" fill="#fbbf24"/>
      <line x1="40" y1="58" x2="40" y2="78" stroke="#e5e7eb" stroke-width="4" stroke-linecap="round"/>
      <line x1="40" y1="66" x2="26" y2="72" stroke="#e5e7eb" stroke-width="4" stroke-linecap="round"/>
      <line x1="40" y1="66" x2="54" y2="72" stroke="#e5e7eb" stroke-width="4" stroke-linecap="round"/>
      <line x1="40" y1="78" x2="30" y2="90" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>
      <line x1="40" y1="78" x2="50" y2="90" stroke="#93c5fd" stroke-width="4" stroke-linecap="round"/>

      <g transform="translate(52 70)">
        <animateTransform attributeName="transform" type="rotate" values="-35 0 0;20 0 0;-35 0 0" dur="0.55s" repeatCount="indefinite"/>
        <rect x="0" y="-2" width="22" height="4" rx="2" fill="#d1a46f"/>
        <rect x="20" y="-5" width="10" height="10" rx="2" fill="#cbd5e1"/>
      </g>
    </g>
  </g>

  <text x="24" y="28" fill="#cbd5e1" font-size="14" font-family="Segoe UI, Arial, sans-serif">Catalyst IQ in build mode...</text>
</svg>
